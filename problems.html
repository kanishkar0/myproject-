<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ask Experts – Texnect</title>
  <meta name="description" content="Post textile problems and get expert solutions on Texnect — yarn breakage, fabric defects, dyeing issues, and more.">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/animations.css">
  <style>
    .problem-card { background:var(--bg-card); border:1px solid var(--border-dim); border-radius:var(--r-card); padding:24px; box-shadow:var(--shadow-md); transition:all 0.35s var(--ease); position:relative; overflow:hidden; cursor:pointer; }
    .problem-card::before { content:''; position:absolute; top:0; left:10%; width:80%; height:2px; background:linear-gradient(90deg,transparent,var(--b400),transparent); opacity:0; transition:opacity 0.35s; }
    .problem-card:hover { border-color:var(--border-bright); transform:translateY(-4px); box-shadow:var(--shadow-card-hover); }
    .problem-card:hover::before { opacity:1; }
    .urgency-high { color:var(--coral); background:var(--coral-soft); border:1px solid rgba(249,112,102,0.3); }
    .urgency-medium { color:var(--amber); background:var(--amber-soft); border:1px solid rgba(245,158,11,0.2); }
    .urgency-low { color:var(--text-secondary); background:var(--bg-section); border:1px solid var(--border-dim); }
    .status-open { color:var(--amber); }
    .status-solved { color:var(--emerald); }
    .answer-card { background:var(--bg-raised); border:1px solid var(--border-dim); border-radius:var(--r-lg); padding:16px 18px; margin-top:10px; transition:all 0.3s var(--ease); }
    .answer-card:hover { border-color:var(--border-mid); }
    .answer-card.accepted { border-left:3px solid var(--emerald); background:rgba(16,185,129,0.04); }
    .problem-detail-overlay { position:fixed; inset:0; background:rgba(5,13,26,0.92); z-index:2000; display:flex; align-items:flex-start; justify-content:center; padding:calc(var(--nav-height)+20px) 20px 20px; overflow-y:auto; backdrop-filter:blur(8px); animation:fadeIn 0.2s ease; }
    .problem-detail { background:var(--bg-card); border:1px solid var(--border-mid); border-radius:var(--r-2xl); width:100%; max-width:780px; padding:32px; animation:scaleIn 0.25s ease; box-shadow:var(--shadow-lg); margin-bottom:40px; }
  </style>
</head>
<body>
  <div id="navbar"></div>

  <div style="padding-top:var(--nav-height);">
    <!-- HERO -->
    <div class="explore-hero" style="padding-bottom:40px;">
      <div class="mesh-lines"></div>
      <div class="orb orb-1"></div>
      <div style="position:relative;z-index:1;">
        <div class="hero-label" style="margin:0 auto 20px;width:fit-content;">
          <i data-lucide="help-circle" style="width:16px;height:16px;stroke-width:1.5"></i>
          Textile Problem-Solving Hub
        </div>
        <h1 class="font-sora" style="font-size:var(--fs-h1);color:var(--text-primary);letter-spacing:-0.02em;">
          Ask <span style="color:var(--b200);">Textile Experts</span>
        </h1>
        <p style="font-size:17px;color:var(--text-secondary);max-width:560px;margin:12px auto 0;line-height:1.6;">
          Post your textile problems — yarn breakage, dyeing issues, fabric defects, machine maintenance — and get solutions from verified industry experts
        </p>

        <!-- CTA -->
        <div style="display:flex;gap:12px;justify-content:center;margin-top:24px;flex-wrap:wrap;">
          <button class="btn btn-primary btn-lg" onclick="openProblemModal()" style="animation:glowPulse 3s ease-in-out infinite;">
            <i data-lucide="plus" style="width:18px;height:18px;stroke-width:1.5"></i>
            Post a Problem
          </button>
          <a href="experts.html" class="btn btn-outline btn-lg">
            <i data-lucide="award" style="width:18px;height:18px;stroke-width:1.5"></i>
            Browse Experts
          </a>
        </div>

        <!-- Quick stats -->
        <div style="display:flex;gap:32px;justify-content:center;margin-top:28px;flex-wrap:wrap;">
          <div style="text-align:center;">
            <div class="hero-stat-value count-up" data-target="1240" data-suffix="+">0</div>
            <div class="hero-stat-label">Problems Solved</div>
          </div>
          <div style="text-align:center;">
            <div class="hero-stat-value count-up" data-target="850" data-suffix="+">0</div>
            <div class="hero-stat-label">Active Experts</div>
          </div>
          <div style="text-align:center;">
            <div class="hero-stat-value count-up" data-target="92" data-suffix="%">0</div>
            <div class="hero-stat-label">Response Rate</div>
          </div>
        </div>
      </div>
    </div>

    <!-- CONTENT -->
    <div class="container" style="padding-top:28px;padding-bottom:60px;">
      <!-- Filters -->
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:20px;">
        <div class="feed-tabs" style="display:inline-flex;background:var(--bg-section);">
          <button class="tab-btn active" onclick="filterProblems(this,'all')">All Problems</button>
          <button class="tab-btn" onclick="filterProblems(this,'open')">
            <i data-lucide="circle" style="width:12px;height:12px;stroke-width:1.5"></i> Open
          </button>
          <button class="tab-btn" onclick="filterProblems(this,'solved')">
            <i data-lucide="check-circle" style="width:12px;height:12px;stroke-width:1.5"></i> Solved
          </button>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;" id="domainFilters"></div>
      </div>

      <!-- Search -->
      <div style="margin-bottom:20px;">
        <input class="input" type="text" id="problemSearch" placeholder="Search problems by title, domain, or tags..." style="border-radius:var(--r-pill);padding-left:42px;" onkeyup="renderProblems()">
      </div>

      <!-- Problems list -->
      <div id="problemsList" style="display:flex;flex-direction:column;gap:14px;"></div>
    </div>
  </div>

  <!-- Problem detail overlay (rendered dynamically) -->
  <div id="problemDetailOverlay"></div>

  <div id="toast-container" class="toast-container"></div>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    initPage('problems');

    let statusFilter = 'all';
    let domainFilter = 'all';

    // Domain filter chips
    const domainFiltersEl = document.getElementById('domainFilters');
    domainFiltersEl.innerHTML = `<button class="tag active" onclick="setDomainFilter('all',this)">All</button>` +
      TC_DATA.expertDomains.slice(0,6).map(d =>
        `<button class="tag" onclick="setDomainFilter('${d}',this)">${d}</button>`
      ).join('');

    function filterProblems(btn, status) {
      statusFilter = status;
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderProblems();
    }
    function setDomainFilter(domain, el) {
      domainFilter = domain;
      document.querySelectorAll('#domainFilters .tag').forEach(t => t.classList.remove('active'));
      if(el) el.classList.add('active');
      renderProblems();
    }

    function renderProblems() {
      const q = (document.getElementById('problemSearch')?.value||'').toLowerCase();
      let problems = TC_DATA.problems;

      if(statusFilter !== 'all') problems = problems.filter(p => p.status === statusFilter);
      if(domainFilter !== 'all') problems = problems.filter(p => p.domain === domainFilter);
      if(q) problems = problems.filter(p =>
        p.title.toLowerCase().includes(q) ||
        p.domain.toLowerCase().includes(q) ||
        p.tags.some(t => t.toLowerCase().includes(q))
      );

      const list = document.getElementById('problemsList');
      if(!problems.length) {
        list.innerHTML = `<div class="empty-state"><div style="opacity:0.3;margin-bottom:16px;">${icon('help-circle',48)}</div><div class="empty-state-text">No problems found</div><button class="btn btn-primary" style="animation:none;margin-top:12px;" onclick="openProblemModal()">Post a Problem</button></div>`;
        if(typeof lucide!=='undefined') lucide.createIcons();
        return;
      }

      list.innerHTML = problems.map((p, i) => {
        const author = getUserById(p.authorId);
        const urgClass = p.urgency==='High'?'urgency-high':p.urgency==='Medium'?'urgency-medium':'urgency-low';
        const statusIcon = p.status==='solved' ? icon('check-circle',14) : icon('circle',14);
        const statusClass = p.status==='solved' ? 'status-solved' : 'status-open';
        const hasAccepted = p.answers.some(a => a.accepted);

        return `
          <div class="problem-card reveal" data-delay="${i*80}" onclick="openProblemDetail('${p.id}')">
            <div style="display:flex;align-items:flex-start;gap:14px;">
              <div style="flex-shrink:0;margin-top:2px;">${author ? avatarHTML(author,'md') : ''}</div>
              <div style="flex:1;min-width:0;">
                <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:6px;">
                  <span class="badge ${urgClass}" style="font-size:11px;padding:2px 8px;border-radius:99px;">${icon('alert-circle',10)} ${p.urgency}</span>
                  <span class="${statusClass}" style="font-size:12px;font-weight:600;display:flex;align-items:center;gap:3px;">${statusIcon} ${p.status==='solved'?'Solved':'Open'}</span>
                  <span class="specialty-pill" style="font-size:11px;padding:2px 8px;--domain:${getDomainColor(p.domain)};--domain-soft:${getDomainColor(p.domain)}12;">${p.domain}</span>
                  <span style="font-size:12px;color:var(--text-hint);margin-left:auto;">${p.posted}</span>
                </div>
                <h3 style="font-family:'Sora',sans-serif;font-size:16px;font-weight:700;color:var(--text-primary);line-height:1.35;margin-bottom:8px;">${p.title}</h3>
                <p style="font-size:14px;color:var(--text-secondary);line-height:1.6;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;">${p.description}</p>
                <div style="display:flex;flex-wrap:wrap;gap:5px;margin-top:10px;">
                  ${p.tags.map(t => `<span class="tag" style="font-size:11px;padding:2px 8px;">${t}</span>`).join('')}
                </div>
                <div style="display:flex;align-items:center;gap:16px;margin-top:12px;padding-top:10px;border-top:1px solid var(--border-dim);">
                  <span style="display:flex;align-items:center;gap:4px;font-size:13px;color:var(--text-secondary);">${icon('arrow-up',14)} ${p.upvotes}</span>
                  <span style="display:flex;align-items:center;gap:4px;font-size:13px;color:var(--text-secondary);">${icon('eye',14)} ${p.views}</span>
                  <span style="display:flex;align-items:center;gap:4px;font-size:13px;color:${hasAccepted?'var(--emerald)':'var(--text-secondary)'};">${icon('message-square',14)} ${p.answerCount} answer${p.answerCount!==1?'s':''} ${hasAccepted?'✓':''}</span>
                  ${author ? `<span style="font-size:12px;color:var(--text-hint);margin-left:auto;">by ${author.name}</span>` : ''}
                </div>
              </div>
            </div>
          </div>
        `;
      }).join('');

      initMotion();
      if(typeof lucide!=='undefined') lucide.createIcons();
    }

    function openProblemDetail(probId) {
      const p = TC_DATA.problems.find(pr => pr.id === probId);
      if(!p) return;
      const author = getUserById(p.authorId);
      const urgClass = p.urgency==='High'?'urgency-high':p.urgency==='Medium'?'urgency-medium':'urgency-low';

      const overlay = document.getElementById('problemDetailOverlay');
      overlay.innerHTML = `
        <div class="problem-detail-overlay" onclick="if(event.target===this)closeProblemDetail()">
          <div class="problem-detail">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">
              <div style="display:flex;align-items:center;gap:8px;">
                <span class="badge ${urgClass}" style="font-size:12px;padding:3px 10px;">${p.urgency} Priority</span>
                <span class="specialty-pill" style="--domain:${getDomainColor(p.domain)};--domain-soft:${getDomainColor(p.domain)}12;">${p.domain}</span>
                <span style="font-size:13px;color:${p.status==='solved'?'var(--emerald)':'var(--amber)'}">${p.status==='solved'?'✓ Solved':'● Open'}</span>
              </div>
              <button class="modal-close" onclick="closeProblemDetail()">✕</button>
            </div>

            <h2 style="font-family:'Sora',sans-serif;font-size:1.3rem;font-weight:800;color:var(--text-primary);line-height:1.3;margin-bottom:12px;">${p.title}</h2>

            <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;">
              ${author ? avatarHTML(author,'sm') : ''}
              <div>
                <div style="font-size:14px;font-weight:600;color:var(--text-primary);">${author?.name||'Anonymous'}</div>
                <div style="font-size:12px;color:var(--text-hint);">${author?.title||''} · ${p.posted}</div>
              </div>
            </div>

            <div style="font-size:15px;color:var(--text-primary);line-height:1.75;white-space:pre-line;margin-bottom:16px;padding:16px;background:var(--bg-raised);border-radius:var(--r-lg);border:1px solid var(--border-dim);">${p.description}</div>

            <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:20px;">
              ${p.tags.map(t => `<span class="tag">${t}</span>`).join('')}
            </div>

            <div style="display:flex;align-items:center;gap:16px;padding:12px 0;border-top:1px solid var(--border-dim);border-bottom:1px solid var(--border-dim);margin-bottom:20px;">
              <button class="post-action-btn" onclick="this.querySelector('.like-count').textContent=parseInt(this.querySelector('.like-count').textContent)+1;this.style.color='var(--b400)';">
                ${icon('arrow-up',18)} <span class="like-count">${p.upvotes}</span> Upvote
              </button>
              <span style="font-size:13px;color:var(--text-hint);">${icon('eye',14)} ${p.views} views</span>
              <button class="post-action-btn" style="margin-left:auto;">${icon('share-2',16)} Share</button>
            </div>

            <!-- Answers -->
            <div style="margin-bottom:16px;">
              <h3 style="font-family:'Sora',sans-serif;font-size:1rem;font-weight:700;color:var(--text-primary);margin-bottom:14px;">
                ${icon('message-square',18)} ${p.answers.length} Answer${p.answers.length!==1?'s':''}
              </h3>
              ${p.answers.map(a => {
                const expert = TC_DATA.experts.find(ex => ex.id === a.expertId);
                const expUser = expert ? getUserById(expert.userId) : null;
                return `
                  <div class="answer-card ${a.accepted?'accepted':''}" style="margin-bottom:10px;">
                    ${a.accepted ? `<div style="display:flex;align-items:center;gap:4px;margin-bottom:10px;font-size:12px;font-weight:600;color:var(--emerald);">${icon('check-circle',14)} Accepted Answer</div>` : ''}
                    <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
                      ${expUser ? avatarHTML(expUser,'sm') : ''}
                      <div style="flex:1;">
                        <div style="font-size:14px;font-weight:600;color:var(--text-primary);">${expUser?.name||'Expert'}</div>
                        <div style="font-size:12px;color:var(--text-hint);">${expert?.specialization||''} · ${expert?.experience||''}</div>
                      </div>
                      <div style="display:flex;align-items:center;gap:4px;">
                        <span style="font-size:13px;font-weight:700;color:var(--b200);">${expert?.rating||''}</span>
                        <span style="font-size:11px;color:var(--amber);">★</span>
                      </div>
                    </div>
                    <div style="font-size:14px;color:var(--text-primary);line-height:1.75;white-space:pre-line;">${a.text}</div>
                    <div style="display:flex;align-items:center;gap:12px;margin-top:10px;padding-top:8px;border-top:1px solid var(--border-dim);">
                      <button class="post-action-btn" onclick="this.querySelector('span').textContent=parseInt(this.querySelector('span').textContent)+1;this.style.color='var(--b400)';">${icon('arrow-up',14)} <span>${a.upvotes}</span></button>
                      <span style="font-size:12px;color:var(--text-hint);">${a.time}</span>
                    </div>
                  </div>
                `;
              }).join('')}
            </div>

            <!-- Post answer -->
            ${Auth.isLoggedIn() ? `
            <div style="padding:16px;background:var(--bg-section);border-radius:var(--r-lg);border:1px solid var(--border-dim);">
              <div style="font-size:14px;font-weight:600;color:var(--text-primary);margin-bottom:10px;">${icon('edit-3',16)} Your Answer</div>
              <textarea class="textarea" id="answerInput" placeholder="Share your expertise on this problem..." style="min-height:100px;margin-bottom:10px;"></textarea>
              <div style="display:flex;justify-content:flex-end;">
                <button class="btn btn-primary" style="animation:none;" onclick="submitAnswer('${p.id}')">${icon('send',16)} Post Answer</button>
              </div>
            </div>
            ` : `<div style="text-align:center;padding:20px;"><a href="auth.html" class="btn btn-primary" style="animation:none;">Sign in to answer</a></div>`}
          </div>
        </div>
      `;
      if(typeof lucide!=='undefined') lucide.createIcons();
    }

    function closeProblemDetail() {
      document.getElementById('problemDetailOverlay').innerHTML = '';
    }

    function submitAnswer(probId) {
      const text = document.getElementById('answerInput')?.value.trim();
      if(!text) { showToast('Write your answer first!','error'); return; }
      showToast('Answer posted successfully!','success');
      closeProblemDetail();
    }

    // Post problem modal
    function openProblemModal() {
      if(!Auth.isLoggedIn()){ window.location.href='auth.html'; return; }
      const user = Auth.getCurrentUser();
      const overlay = document.createElement('div');
      overlay.className = 'modal-overlay';
      overlay.id = 'problemModal';
      overlay.innerHTML = `
        <div class="modal" style="max-width:620px;">
          <div class="modal-header">
            <h3 class="modal-title">${icon('help-circle',20)} Post a Textile Problem</h3>
            <button class="modal-close" onclick="document.getElementById('problemModal').remove()">✕</button>
          </div>
          <div class="input-group" style="margin-bottom:14px;">
            <label class="input-label">Problem Title</label>
            <input class="input" type="text" placeholder="e.g., Yarn breakage on Ring Frame at high speed">
          </div>
          <div style="display:flex;gap:12px;margin-bottom:14px;">
            <div class="input-group" style="flex:1;">
              <label class="input-label">Domain</label>
              <select class="select">${TC_DATA.expertDomains.map(d => `<option>${d}</option>`).join('')}</select>
            </div>
            <div class="input-group" style="flex:1;">
              <label class="input-label">Urgency</label>
              <select class="select"><option>Low</option><option>Medium</option><option selected>High</option></select>
            </div>
          </div>
          <div class="input-group" style="margin-bottom:14px;">
            <label class="input-label">Description</label>
            <textarea class="textarea" placeholder="Describe your problem in detail — include machine specs, fabric type, process parameters, observations..." style="min-height:140px;"></textarea>
          </div>
          <div class="input-group" style="margin-bottom:14px;">
            <label class="input-label">Tags (comma-separated)</label>
            <input class="input" type="text" placeholder="e.g., Ring Spinning, Cotton 40s, Yarn Breakage">
          </div>
          <div style="display:flex;justify-content:flex-end;gap:10px;margin-top:20px;">
            <button class="btn btn-ghost" onclick="document.getElementById('problemModal').remove()">Cancel</button>
            <button class="btn btn-primary" style="animation:none;" onclick="document.getElementById('problemModal').remove();showToast('Problem posted! Experts will respond shortly.','success');">${icon('send',16)} Post Problem</button>
          </div>
        </div>
      `;
      document.body.appendChild(overlay);
      if(typeof lucide!=='undefined') lucide.createIcons();
    }

    renderProblems();
    if(typeof lucide!=='undefined') lucide.createIcons();
  </script>
</body>
</html>
