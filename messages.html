<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Messages – TextileConnect</title>
  <meta name="description" content="Message textile professionals directly on TextileConnect.">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/animations.css">
</head>
<body>
  <div id="navbar"></div>

  <div style="max-width:1100px;margin:0 auto;padding:calc(var(--nav-height) + 24px) 24px 40px;" class="page-content">
    <div class="messages-layout" id="messagesLayout">

      <!-- Conversation List -->
      <div class="conv-list">
        <div class="conv-list-header">
          <span>Messages</span>
          <button class="btn btn-primary btn-sm" onclick="newMessageModal()">✏️ New</button>
        </div>
        <div style="padding:12px;">
          <input type="text" class="input" placeholder="🔍 Search messages…" oninput="filterConversations(this.value)" style="border-radius:var(--r-full);">
        </div>
        <div id="convList"></div>
      </div>

      <!-- Chat Window -->
      <div class="chat-window" id="chatWindow">
        <!-- Loaded dynamically -->
      </div>
    </div>
  </div>

  <!-- New Message Modal -->
  <div id="newMsgModal" class="modal-overlay" style="display:none;">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title">✉️ New Message</h3>
        <button class="modal-close" onclick="document.getElementById('newMsgModal').style.display='none'">✕</button>
      </div>
      <div class="input-group" style="margin-bottom:16px;">
        <label class="input-label">To</label>
        <select class="select" id="newMsgRecipient">
          ${'' /* filled by JS */}
        </select>
      </div>
      <div class="input-group" style="margin-bottom:20px;">
        <label class="input-label">Message</label>
        <textarea class="textarea" id="newMsgText" placeholder="Write your message…" style="min-height:100px;"></textarea>
      </div>
      <div style="display:flex;gap:12px;justify-content:flex-end;">
        <button class="btn btn-ghost" onclick="document.getElementById('newMsgModal').style.display='none'">Cancel</button>
        <button class="btn btn-primary" onclick="sendNewMessage()">Send Message</button>
      </div>
    </div>
  </div>

  <div id="toast-container" class="toast-container"></div>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    Auth.requireAuth();
    initPage('messages');

    let currentConv = null;
    let conversations = JSON.parse(JSON.stringify(TC_DATA.conversations)); // deep copy

    function renderConvList(filter = '') {
      const list = document.getElementById('convList');
      const filtered = conversations.filter(c => {
        const user = getUserById(c.userId);
        return !filter || (user && user.name.toLowerCase().includes(filter.toLowerCase()));
      });

      list.innerHTML = filtered.map(conv => {
        const user = getUserById(conv.userId);
        if (!user) return '';
        return `
          <div class="conv-item ${currentConv && currentConv.id === conv.id ? 'active' : ''}" onclick="openConversation('${conv.id}')" id="conv-item-${conv.id}">
            ${avatarHTML(user, 'md')}
            <div class="conv-info">
              <div class="conv-name">${user.name}</div>
              <div class="conv-last">${conv.lastMessage}</div>
            </div>
            <div class="conv-meta">
              <div class="conv-time">${conv.time}</div>
              ${conv.unread > 0 ? `<div class="conv-unread">${conv.unread}</div>` : ''}
            </div>
          </div>
        `;
      }).join('');
    }

    function openConversation(convId) {
      currentConv = conversations.find(c => c.id === convId);
      if (!currentConv) return;

      // Mark as read
      currentConv.unread = 0;
      renderConvList();

      const user = getUserById(currentConv.userId);
      const chatWindow = document.getElementById('chatWindow');
      const myUser = Auth.getCurrentUser();

      chatWindow.innerHTML = `
        <div class="chat-header">
          ${avatarHTML(user, 'md')}
          <div>
            <div style="font-weight:700;">${user.name}</div>
            <div style="font-size:0.78rem;color:var(--clr-success);">● Online</div>
          </div>
          <div style="margin-left:auto;display:flex;gap:8px;">
            <button class="btn btn-ghost btn-sm" onclick="window.location.href='profile.html?id=${user.id}'">👤 Profile</button>
            <button class="btn btn-ghost btn-sm" onclick="showToast('Call feature coming soon!','info')">📞 Call</button>
          </div>
        </div>
        <div class="chat-messages" id="chatMessages">
          ${currentConv.messages.map(m => {
            const isMine = m.from === 'me' || m.from === myUser.id;
            const sender = isMine ? myUser : user;
            return `
              <div class="chat-bubble-wrap ${isMine ? 'mine' : ''}">
                ${!isMine ? avatarHTML(sender, 'sm') : ''}
                <div>
                  <div class="chat-bubble ${isMine ? 'mine' : 'theirs'}">${m.text}</div>
                  <div class="chat-time" style="text-align:${isMine ? 'right' : 'left'}">${m.time}</div>
                </div>
              </div>
            `;
          }).join('')}
        </div>
        <div class="chat-input-bar">
          <button class="btn btn-ghost btn-icon" onclick="showToast('Emoji picker coming soon!','info')" title="Emoji">😊</button>
          <button class="btn btn-ghost btn-icon" onclick="showToast('File sharing coming soon!','info')" title="Attach">📎</button>
          <input type="text" id="chatInput" placeholder="Type a message…" onkeydown="sendMessage(event)">
          <button class="btn btn-primary" onclick="sendMessageBtn()">Send ↗️</button>
        </div>
      `;

      // Scroll to bottom
      setTimeout(() => {
        const msgs = document.getElementById('chatMessages');
        if (msgs) msgs.scrollTop = msgs.scrollHeight;
      }, 50);
    }

    function sendMessage(event) {
      if (event.key === 'Enter') sendMessageBtn();
    }

    function sendMessageBtn() {
      const input = document.getElementById('chatInput');
      const text = input.value.trim();
      if (!text || !currentConv) return;
      const myUser = Auth.getCurrentUser();
      const now = new Date();
      const timeStr = now.getHours() + ':' + String(now.getMinutes()).padStart(2,'0');

      currentConv.messages.push({ from: 'me', text, time: timeStr });
      currentConv.lastMessage = text;
      currentConv.time = 'just now';
      input.value = '';

      // Re-render chat
      openConversation(currentConv.id);

      // Simulate reply after 1.5s
      setTimeout(() => {
        const replies = [
          'Thank you for reaching out! I will get back to you soon.',
          'That sounds great! Let\'s discuss further.',
          'Excellent! I appreciate your interest in our textiles.',
          'Very interesting! Could you share more details?',
          'Great point! I have been thinking about this too.'
        ];
        const reply = replies[Math.floor(Math.random() * replies.length)];
        currentConv.messages.push({ from: currentConv.userId, text: reply, time: timeStr });
        currentConv.lastMessage = reply;
        openConversation(currentConv.id);
      }, 1500);
    }

    function filterConversations(q) { renderConvList(q); }

    function newMessageModal() {
      const modal = document.getElementById('newMsgModal');
      const select = document.getElementById('newMsgRecipient');
      select.innerHTML = TC_DATA.users.map(u => `<option value="${u.id}">${u.name} – ${u.role}</option>`).join('');
      modal.style.display = 'flex';
    }

    function sendNewMessage() {
      const recipientId = document.getElementById('newMsgRecipient').value;
      const text = document.getElementById('newMsgText').value.trim();
      if (!text) { showToast('Please write a message', 'error'); return; }

      const existing = conversations.find(c => c.userId === recipientId);
      if (existing) {
        existing.messages.push({ from: 'me', text, time: 'now' });
        existing.lastMessage = text;
        existing.time = 'just now';
        document.getElementById('newMsgModal').style.display = 'none';
        openConversation(existing.id);
      } else {
        const newConv = {
          id: 'conv_' + Date.now(),
          userId: recipientId,
          lastMessage: text,
          time: 'just now',
          unread: 0,
          messages: [{ from: 'me', text, time: 'now' }]
        };
        conversations.unshift(newConv);
        document.getElementById('newMsgModal').style.display = 'none';
        renderConvList();
        openConversation(newConv.id);
      }
      showToast('Message sent!', 'success');
    }

    // Init
    renderConvList();
    if (conversations.length > 0) openConversation(conversations[0].id);
    else {
      document.getElementById('chatWindow').innerHTML = `
        <div style="display:flex;align-items:center;justify-content:center;height:100%;flex-direction:column;gap:16px;color:var(--txt-muted);">
          <div style="font-size:3rem;">💬</div>
          <div>Select a conversation or start a new one</div>
          <button class="btn btn-primary" onclick="newMessageModal()">✏️ New Message</button>
        </div>
      `;
    }
  </script>
</body>
</html>
