<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Messages – Texnect</title>
  <meta name="description" content="Message textile professionals directly on Texnect.">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/animations.css">
</head>
<body>
  <div id="navbar"></div>
  <div class="container" style="padding-top:calc(var(--nav-height) + 24px);padding-bottom:24px;">
    <div class="messages-layout" id="messagesLayout"></div>
  </div>
  <div id="toast-container" class="toast-container"></div>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    Auth.requireAuth();
    initPage('messages');

    const convos = TC_DATA.conversations || [];
    const me = Auth.getCurrentUser();
    let activeConvo = convos[0] || null;

    function renderMessages() {
      const layout = document.getElementById('messagesLayout');
      layout.innerHTML = `
        <div class="inbox-panel">
          <div class="inbox-header">
            <span style="font-family:'Sora',sans-serif;">Messages</span>
            <button class="btn btn-ghost btn-icon" style="width:32px;height:32px;">${icon('edit',16)}</button>
          </div>
          <div class="inbox-search"><input type="text" placeholder="Search conversations..." onkeyup="filterConvos(this.value)"></div>
          <div class="inbox-list" id="inboxList">
            ${convos.map((c,i) => {
              const other = getUserById(c.userId);
              if(!other) return '';
              return `
                <div class="inbox-item ${i===0?'active':''}" onclick="selectConvo(${i})" id="inbox-${i}">
                  ${avatarHTML(other,'sm')}
                  <div style="flex:1;min-width:0;">
                    <div class="inbox-name">${other.name}</div>
                    <div class="inbox-preview">${c.lastMessage||'Start a conversation'}</div>
                  </div>
                  <span class="inbox-time">${c.time||''}</span>
                  ${c.unread ? '<span class="inbox-unread"></span>' : ''}
                </div>
              `;
            }).join('')}
          </div>
        </div>
        <div class="chat-panel" id="chatPanel">
          ${renderChat()}
        </div>
      `;
      if(typeof lucide!=='undefined') lucide.createIcons();
    }

    function renderChat() {
      if(!activeConvo) return '<div class="empty-state" style="height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;">' + icon('message-circle',48) + '<div class="empty-state-text" style="margin-top:16px;">Select a conversation</div></div>';
      const other = getUserById(activeConvo.userId);
      if(!other) return '';
      const msgs = activeConvo.messages || [];
      return `
        <div class="chat-header">
          ${avatarHTML(other,'sm')}
          <div>
            <div style="font-weight:600;font-size:14px;color:var(--text-primary);">${other.name}</div>
            <div style="font-size:12px;color:var(--b400);display:flex;align-items:center;gap:4px;">${icon('circle',8)} Online</div>
          </div>
        </div>
        <div class="chat-messages">
          ${msgs.map(m => `
            <div class="message-row ${m.fromMe ? 'own' : ''}">
              ${!m.fromMe ? avatarHTML(other,'sm') : ''}
              <div>
                <div class="message-bubble">${m.text}</div>
                <div class="message-time">${m.time}</div>
              </div>
            </div>
          `).join('')}
        </div>
        <div class="chat-input-row">
          <input class="chat-input" type="text" placeholder="Type a message..." id="chatInput" onkeydown="if(event.key==='Enter')sendMsg()">
          <button class="btn btn-primary btn-icon" style="animation:none;" onclick="sendMsg()">${icon('send',18)}</button>
        </div>
      `;
    }

    function selectConvo(i) {
      activeConvo = convos[i];
      document.querySelectorAll('.inbox-item').forEach(el => el.classList.remove('active'));
      const el = document.getElementById('inbox-'+i);
      if(el) el.classList.add('active');
      document.getElementById('chatPanel').innerHTML = renderChat();
      if(typeof lucide!=='undefined') lucide.createIcons();
    }

    function sendMsg() {
      const input = document.getElementById('chatInput');
      const text = input.value.trim();
      if(!text) return;
      if(!activeConvo.messages) activeConvo.messages = [];
      activeConvo.messages.push({text, fromMe:true, time:'now'});
      input.value = '';
      document.getElementById('chatPanel').innerHTML = renderChat();
      if(typeof lucide!=='undefined') lucide.createIcons();
      const chatMsgs = document.querySelector('.chat-messages');
      if(chatMsgs) chatMsgs.scrollTop = chatMsgs.scrollHeight;
    }

    function filterConvos(q) {
      q = q.toLowerCase();
      document.querySelectorAll('.inbox-item').forEach(el => {
        const name = el.querySelector('.inbox-name')?.textContent.toLowerCase()||'';
        el.style.display = name.includes(q) ? '' : 'none';
      });
    }

    renderMessages();
  </script>
</body>
</html>
