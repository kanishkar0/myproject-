<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile – Texnect</title>
  <meta name="description" content="Your professional textile industry profile on Texnect.">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/animations.css">
</head>
<body>
  <div id="navbar"></div>
  <div class="page-layout two-col" style="padding-top:calc(var(--nav-height) + 20px);">
    <div id="leftSidebar" class="sidebar-left"></div>
    <main style="min-width:0;">
      <div id="profileContent"></div>
    </main>
  </div>
  <div id="toast-container" class="toast-container"></div>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    Auth.requireAuth();
    initPage('profile');
    const urlId = new URLSearchParams(location.search).get('id');
    const profileUser = urlId ? getUserById(urlId) : Auth.getCurrentUser();
    const isOwnProfile = !urlId || urlId === Auth.getCurrentUser()?.id;

    document.getElementById('leftSidebar').innerHTML = renderLeftSidebar('profile');

    if (!profileUser) {
      document.getElementById('profileContent').innerHTML = '<div class="empty-state"><div class="empty-state-icon" style="opacity:0.3;">' + icon('user-x',48) + '</div><div class="empty-state-text">Profile not found</div><a href="explore.html" class="btn btn-primary" style="animation:none;">Explore People</a></div>';
    } else {
      const u = profileUser;
      const posts = Posts.getAll().filter(p => p.authorId === u.id);

      document.getElementById('profileContent').innerHTML = `
        <div class="reveal">
          <div class="profile-banner"><div class="profile-banner-pattern"></div></div>
          <div class="profile-info-card">
            <div class="profile-avatar-wrapper">
              ${avatarHTML(u, 'xl')}
              <div class="profile-online-dot"></div>
            </div>
            <div class="profile-name">${u.name}</div>
            <div class="profile-title">${u.title || u.role}</div>
            <div class="profile-location" style="display:flex;align-items:center;gap:4px;">${icon('map-pin',14)} ${u.location || u.company}</div>
            <div class="profile-actions">
              ${isOwnProfile
                ? `<button class="btn btn-outline">${icon('edit-3',16)} Edit Profile</button><button class="btn btn-ghost">${icon('share-2',16)} Share</button>`
                : `<button class="btn btn-primary" style="animation:none;" onclick="connectUser('${u.id}',this)">${icon('user-plus',16)} Connect</button><button class="btn btn-outline">${icon('message-circle',16)} Message</button>`}
            </div>
            <div class="profile-stats">
              <div class="profile-stat"><div class="profile-stat-value">${posts.length}</div><div class="profile-stat-label">Posts</div></div>
              <div class="profile-stat"><div class="profile-stat-value">${(u.connections||0).toLocaleString()}</div><div class="profile-stat-label">Connections</div></div>
              <div class="profile-stat"><div class="profile-stat-value">${(u.followers||0).toLocaleString()}</div><div class="profile-stat-label">Followers</div></div>
            </div>
          </div>
        </div>

        <div class="profile-section reveal">
          <div class="profile-section-title">${icon('info',18)} About</div>
          <p style="line-height:1.7;">${u.about || 'No bio added yet.'}</p>
        </div>

        <div class="profile-section reveal">
          <div class="profile-section-title">${icon('briefcase',18)} Experience</div>
          ${(u.experience||[]).length ? u.experience.map(exp => `
            <div class="experience-item">
              <div class="exp-icon">${icon('building-2',20)}</div>
              <div>
                <div class="exp-title">${exp.title}</div>
                <div class="exp-company">${exp.company}</div>
                <div class="exp-years">${exp.years}</div>
                <div class="exp-desc">${exp.description||''}</div>
              </div>
            </div>
          `).join('') : '<p style="color:var(--text-hint);">No experience added yet.</p>'}
        </div>

        <div class="profile-section reveal">
          <div class="profile-section-title">${icon('sparkles',18)} Skills & Specialties</div>
          <div style="display:flex;flex-wrap:wrap;gap:8px;">
            ${u.fabricType ? `<span class="specialty-pill" style="font-size:13px;padding:5px 14px;">${u.fabricType}</span>` : ''}
            ${(u.skills||[]).map(s => `<span class="tag">${s}</span>`).join('')}
            ${!u.fabricType && !(u.skills||[]).length ? '<p style="color:var(--text-hint);">No skills added yet.</p>' : ''}
          </div>
        </div>

        ${posts.length ? `
        <div class="profile-section reveal">
          <div class="profile-section-title">${icon('rss',18)} Recent Activity</div>
          <div class="feed">${posts.slice(0,3).map(p => renderPost(p)).join('')}</div>
        </div>
        ` : ''}
      `;
    }
    if(typeof lucide!=='undefined') lucide.createIcons();
  </script>
</body>
</html>
