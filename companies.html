<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Companies – Texnect</title>
  <meta name="description" content="Explore textile companies, mills, and brands on Texnect.">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/animations.css">
</head>
<body>
  <div id="navbar"></div>
  <div class="page-layout" style="padding-top:calc(var(--nav-height) + 20px);">
    <div id="leftSidebar" class="sidebar-left"></div>
    <main style="min-width:0;">
      <div class="section-header reveal">
        <h2 class="section-title" id="companyTitle"></h2>
      </div>

      <div style="margin-bottom:20px;" class="reveal">
        <input class="input" type="text" placeholder="Search companies..." id="companySearch" onkeyup="filterCompanies()" style="border-radius:var(--r-pill);padding-left:42px;position:relative;">
      </div>

      <div class="filter-row reveal" id="companyFilters">
        <button class="tag active" onclick="filterType(this,'all')">All</button>
        <button class="tag" onclick="filterType(this,'Manufacturing')">Manufacturing</button>
        <button class="tag" onclick="filterType(this,'Design')">Design</button>
        <button class="tag" onclick="filterType(this,'Export')">Export</button>
        <button class="tag" onclick="filterType(this,'Research')">Research</button>
      </div>

      <div id="companiesGrid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;margin-top:20px;"></div>
    </main>
    <div id="rightSidebar" class="sidebar-right"></div>
  </div>
  <div id="toast-container" class="toast-container"></div>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    Auth.requireAuth();
    initPage('companies');
    document.getElementById('leftSidebar').innerHTML = renderLeftSidebar('companies');
    document.getElementById('rightSidebar').innerHTML = renderRightSidebar();
    document.getElementById('companyTitle').innerHTML = icon('building-2',22) + ' Company Directory';

    let currentType = 'all';

    function renderCompanies() {
      const q = (document.getElementById('companySearch')?.value||'').toLowerCase();
      let companies = TC_DATA.companies || [];
      if(currentType !== 'all') companies = companies.filter(c => (c.industry||'').toLowerCase().includes(currentType.toLowerCase()));
      if(q) companies = companies.filter(c => (c.name+c.tagline+(c.industry||'')).toLowerCase().includes(q));

      const grid = document.getElementById('companiesGrid');
      if(!companies.length) {
        grid.innerHTML = '<div class="empty-state"><div class="empty-state-icon">' + icon('building-2',48) + '</div><div class="empty-state-text">No companies found</div></div>';
        if(typeof lucide!=='undefined') lucide.createIcons();
        return;
      }
      const bgGrads = ['var(--b800),var(--bg-section)','var(--b600),var(--b800)','var(--bg-section),var(--b600)','var(--b800),var(--bg-raised)'];
      grid.innerHTML = companies.map((c,i) => `
        <div class="company-card reveal" data-delay="${i*80}">
          <div class="company-card-banner" style="background:linear-gradient(135deg,${bgGrads[i%bgGrads.length]});"></div>
          <div class="company-card-body">
            <div class="company-logo" style="background:linear-gradient(135deg,var(--b600),var(--b400));">${(c.name||'C')[0]}</div>
            <div class="company-name">${c.name}</div>
            <div class="company-tagline">${c.tagline||''}</div>
            <div class="company-meta">
              <span style="display:flex;align-items:center;gap:4px;">${icon('map-pin',14)} ${c.location||'India'}</span>
              <span style="display:flex;align-items:center;gap:4px;">${icon('briefcase',14)} ${c.industry||'Textiles'}</span>
              <span style="display:flex;align-items:center;gap:4px;">${icon('users',14)} ${c.size||'50-200'} employees</span>
            </div>
            <div style="margin-top:14px;display:flex;gap:8px;">
              <button class="btn btn-outline btn-sm" style="flex:1;" onclick="this.innerHTML=icon('check',14)+' Following';this.disabled=true;this.style.opacity='0.6';showToast('Following '+${JSON.stringify(c.name)},'success');if(typeof lucide!=='undefined')lucide.createIcons();">${icon('user-plus',14)} Follow</button>
              <button class="btn btn-ghost btn-sm" style="flex:1;">${icon('eye',14)} View</button>
            </div>
          </div>
        </div>
      `).join('');
      initMotion();
      if(typeof lucide!=='undefined') lucide.createIcons();
    }

    function filterType(btn, type) {
      document.querySelectorAll('#companyFilters .tag').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      currentType = type;
      renderCompanies();
    }

    function filterCompanies() { renderCompanies(); }

    renderCompanies();
    if(typeof lucide!=='undefined') lucide.createIcons();
  </script>
</body>
</html>
