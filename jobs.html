<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jobs – Texnect</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/animations.css">
  <style>
    .jobs-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }
    @media (max-width: 900px) {
      .jobs-grid { grid-template-columns: 1fr; }
    }

    .job-card .job-badge-new {
      position: absolute; top: 14px; right: 14px;
      padding: 3px 10px;
      border-radius: var(--r-pill);
      font-size: 11px; font-weight: 700;
      background: rgba(55,138,221,0.15);
      border: 1px solid rgba(55,138,221,0.3);
      color: var(--b200);
      letter-spacing: 0.3px;
    }

    .job-type-badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 10px;
      border-radius: var(--r-pill);
      font-size: 11px; font-weight: 600;
      background: var(--bg-section);
      border: 1px solid var(--border-dim);
      color: var(--b200);
    }

    .job-desc {
      font-size: 13px; color: var(--text-secondary);
      line-height: 1.55; margin-top: 10px;
      display: -webkit-box; -webkit-line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden;
    }

    .job-tags {
      display: flex; flex-wrap: wrap; gap: 5px;
      margin-top: 10px;
    }
    .job-tag-pill {
      padding: 2px 8px;
      border-radius: var(--r-pill);
      font-size: 11px; font-weight: 500;
      background: rgba(55,138,221,0.06);
      border: 1px solid var(--border-dim);
      color: var(--text-hint);
    }

    .jobs-header-row {
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 12px;
      margin-bottom: 20px;
    }
    .jobs-count {
      font-size: 13px; color: var(--text-hint);
    }
  </style>
</head>
<body>
  <!-- Navbar -->
  <div id="navbar"></div>

  <!-- Page Layout -->
  <div class="page-layout">
    <!-- Left Sidebar -->
    <div id="leftSidebar"></div>

    <!-- Center Content -->
    <main>
      <div class="section-header reveal">
        <h2 class="section-title" style="display:flex;align-items:center;gap:10px;">
          <i data-lucide="briefcase" style="width:22px;height:22px;stroke-width:1.5;color:var(--b400)"></i>
          Textile Jobs & Opportunities
        </h2>
        <span class="jobs-count" id="jobsCount"></span>
      </div>

      <!-- Filter Row -->
      <div class="filter-row reveal" id="filterRow">
        <button class="tag active" data-filter="all" onclick="filterJobs('all', this)">
          <i data-lucide="layers" style="width:14px;height:14px;stroke-width:1.5"></i> All
        </button>
        <button class="tag" data-filter="Full-time" onclick="filterJobs('Full-time', this)">
          <i data-lucide="clock" style="width:14px;height:14px;stroke-width:1.5"></i> Full-time
        </button>
        <button class="tag" data-filter="Remote" onclick="filterJobs('Remote', this)">
          <i data-lucide="wifi" style="width:14px;height:14px;stroke-width:1.5"></i> Remote
        </button>
        <button class="tag" data-filter="Internship" onclick="filterJobs('Internship', this)">
          <i data-lucide="graduation-cap" style="width:14px;height:14px;stroke-width:1.5"></i> Internship
        </button>
      </div>

      <!-- Jobs Grid -->
      <div class="jobs-grid" id="jobsGrid"></div>

      <!-- Empty state -->
      <div class="empty-state" id="emptyState" style="display:none;">
        <div class="empty-state-icon">
          <i data-lucide="search-x" style="width:48px;height:48px;stroke-width:1;color:var(--text-hint)"></i>
        </div>
        <div class="empty-state-text">No jobs found for this filter. Try another category.</div>
      </div>
    </main>

    <!-- Right Sidebar -->
    <div id="rightSidebar"></div>
  </div>

  <!-- Toast -->
  <div id="toast-container" class="toast-container"></div>

  <!-- Scripts -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    lucide.createIcons();

    // Auth guard
    if (!Auth.requireAuth()) { /* redirects */ }

    // Render sidebars
    document.getElementById('leftSidebar').innerHTML = renderLeftSidebar('jobs');
    document.getElementById('rightSidebar').innerHTML = renderRightSidebar();

    // ── Render job cards ──
    let currentFilter = 'all';

    function getCompanyInitials(name) {
      return name.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
    }

    function getCompanyColor(companyId) {
      const company = TC_DATA.companies.find(c => c.id === companyId);
      if (company) {
        // Map company colors to blue system
        const colorMap = {
          'var(--b600)': 'var(--b600)',
          'var(--b400)': 'var(--b400)',
          'var(--b400)': 'var(--b400)',
          'var(--b600)': 'var(--b600)',
          'var(--b200)': 'var(--b600)',
          'var(--b800)': 'var(--b400)',
        };
        return colorMap[company.color] || 'var(--b600)';
      }
      return 'var(--b600)';
    }

    function renderJobCard(job) {
      const company = TC_DATA.companies.find(c => c.id === job.companyId);
      const companyBg = getCompanyColor(job.companyId);
      const initials = getCompanyInitials(job.company);

      return `
        <div class="job-card reveal" onclick="applyJob('${job.id}')">
          ${job.isNew ? '<span class="job-badge-new"><i data-lucide="sparkles" style="width:10px;height:10px;stroke-width:2"></i> NEW</span>' : ''}
          <div class="job-card-header">
            <div class="job-company-logo" style="background:${companyBg};color:var(--b050);font-family:'Sora',sans-serif;font-weight:700;font-size:14px;">
              ${initials}
            </div>
            <div>
              <div class="job-title">${job.title}</div>
              <div class="job-company">${job.company}</div>
            </div>
          </div>

          <div class="job-meta">
            <span class="job-meta-item">
              <i data-lucide="map-pin" style="width:14px;height:14px;stroke-width:1.5;color:var(--b400)"></i>
              ${job.location}
            </span>
            <span class="job-meta-item">
              <i data-lucide="banknote" style="width:14px;height:14px;stroke-width:1.5;color:var(--b400)"></i>
              ${job.salary}
            </span>
            <span class="job-type-badge">
              <i data-lucide="clock" style="width:11px;height:11px;stroke-width:1.5"></i>
              ${job.type}
            </span>
          </div>

          <div class="job-desc">${job.description}</div>

          <div class="job-tags">
            ${(job.requirements || []).slice(0, 3).map(r => `<span class="job-tag-pill">${r}</span>`).join('')}
          </div>

          <div class="job-footer">
            <span class="job-applicants">
              <i data-lucide="users" style="width:13px;height:13px;stroke-width:1.5;color:var(--text-hint)"></i>
              ${job.applicants} applicants
            </span>
            <button class="btn btn-primary btn-sm" onclick="event.stopPropagation();applyJob('${job.id}')" style="animation:none;">
              <i data-lucide="send" style="width:14px;height:14px;stroke-width:1.5"></i>
              Apply
            </button>
          </div>
        </div>
      `;
    }

    function renderJobs(filter) {
      const grid = document.getElementById('jobsGrid');
      const emptyState = document.getElementById('emptyState');
      const countEl = document.getElementById('jobsCount');

      let jobs = TC_DATA.jobs;
      if (filter && filter !== 'all') {
        jobs = jobs.filter(j => j.type === filter);
      }

      countEl.textContent = jobs.length + ' opportunit' + (jobs.length === 1 ? 'y' : 'ies');

      if (jobs.length === 0) {
        grid.innerHTML = '';
        emptyState.style.display = 'block';
      } else {
        emptyState.style.display = 'none';
        grid.innerHTML = jobs.map(renderJobCard).join('');
      }

      // Re-init lucide + motion
      if (typeof lucide !== 'undefined') lucide.createIcons();
      initMotion();
    }

    function filterJobs(filter, btn) {
      currentFilter = filter;
      // Update active tag
      document.querySelectorAll('#filterRow .tag').forEach(t => t.classList.remove('active'));
      if (btn) btn.classList.add('active');
      renderJobs(filter);
    }

    function applyJob(jobId) {
      const job = TC_DATA.jobs.find(j => j.id === jobId);
      if (job) {
        showToast('Application submitted for ' + job.title + '!', 'success');
      }
    }

    // Initial render
    renderJobs('all');
    initPage('jobs');
  </script>
</body>
</html>
